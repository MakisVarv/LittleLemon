{% extends 'base.html' %} {% load static %} {% block content %}
<section>
  <article>
    <h1>Menu item</h1>
    <span>
      <a href="{% url 'home' %}">Home</a> /
      <a href="{% url 'menu' %}">Menu</a>/
      <a href="{% url 'menu_item' pk=menu_item.pk %}"
        >{{menu_item.name}}</a
      >
    </span>
    <!--Begin row-->
    <div class="row">
      <!--Begin col-->
      <div class="column">
        <h2>
          {{menu_item.name}}
          <!-- Add DTL variable for menu_item_name -->
        </h2>
        <p>
          {{menu_item.menu_item_description}}
          <!-- Add DTL variable for description -->
        </p>
        <p>
          <!-- Add DTL variable for price -->
          Price : $ {{menu_item.price}}
        </p>
      </div>
      <!--End col-->
      <!--Begin col-->
      <div class="column">
        <img
          src="{% static 'img/menu_items/' %}{{ menu_item.name }}.jpg"
          alt="{{ menu_item.name }}"
        />
      </div>
      <!--End col-->
    </div>
    <!--End row-->
  </article>
</section>
{% endblock %}
