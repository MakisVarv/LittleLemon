{% extends 'base.html' %} {% load static %} {% block content %}
<section>
  <article>
    <h1>Make a reservation</h1>
    <!--Begin row-->
    <div class="row">
      <!--Begin col-->
      <div class="column">
        {% csrf_token %}
        <form method="POST" id="form">
          <!-- {% csrf_token %} -->
          <p>
            <label for="guest_name">Name:</label>
            <input
              type="text"
              placeholder="Your Name"
              maxlength="200"
              required=""
              id="guest_name"
            />
          </p>
          <p>
            <label for="reservation_date">Reservation date:</label>
            <input type="date" required id="reservation_date" />
          </p>

          <p>
            <label for="reservation_slot">Reservation time:</label>
            <select id="reservation_slot">
              <option value="0" disabled>Select time</option>
            </select>
          </p>
          <button type="button" id="button">Reserve</button>
        </form>
      </div>
      <!--End col-->

      <!--Begin col-->
      <div class="column">
        <h2>Bookings For <span id="today"></span></h2>
        <div id="bookings"></div>
      </div>
      <!--End col-->
    </div>
    <!--End row-->
  </article>
</section>
<script>
  const date = new Date();
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');

  document.getElementById('reservation_date').value =
    `${year}-${month}-${day}`;

  console.log(document.getElementById('reservation_date').value);
  getBookings();

  document
    .getElementById('reservation_date')
    .addEventListener('change', function () {
      getBookings();
    });

  function getBookings() {
    let reserved_slots = [];
    const date = document.getElementById('reservation_date').value;
    document.getElementById('today').innerHTML = date;

    fetch("{% url 'bookings' %}" + '?date=' + date)
      .then((r) => r.json())
      .then((data) => {
        reserved_slots = [];
        bookings = '';

        for (item of data) {
          console.log(item.fields);
          reserved_slots.push(item.fields.reservation_slot);
          bookings += `<p>${item.fields.guest_name} - ${formatTime(item.fields.reservation_slot)}</p>`;
        }

        let slot_options =
          '<option value="0" disabled>Select time</option>';

        for (let i = 10; i < 20; i++) {
          const label = formatTime(i);

          if (reserved_slots.includes(i)) {
            slot_options += `<option value="${i}" disabled>${label}</option>`;
          } else {
            slot_options += `<option value="${i}">${label}</option>`;
          }
        }

        document.getElementById('reservation_slot').innerHTML =
          slot_options;
        if (bookings == '') {
          bookings = 'No bookings';
        }
        document.getElementById('bookings').innerHTML = bookings;
      });
  }

  function formatTime(time) {
    const ampm = time < 12 ? 'AM' : 'PM';
    const t = time < 12 ? time : time > 12 ? time - 12 : time;
    const label = `${t} ${ampm}`;
    return label;
  }

  document
    .getElementById('button')
    .addEventListener('click', function (e) {
      const formdata = {
        guest_name: document.getElementById('guest_name').value,
        reservation_date: document.getElementById('reservation_date')
          .value,
        reservation_slot: document.getElementById('reservation_slot')
          .value,
      };

      fetch("{% url 'bookings' %}", {
        method: 'post',
        body: JSON.stringify(formdata),
      })
        .then((r) => r.text())
        .then((data) => {
          getBookings();
        });
    });
</script>
{% endblock %}
